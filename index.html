<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Blizzard Imperial - Prediction TOUR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --background: 220, 25%, 6%;
      --foreground: 200, 20%, 90%;
      --card: 220, 20%, 10%;
      --primary: 45, 65%, 52%;
      --secondary: 220, 15%, 16%;
      --muted: 220, 15%, 14%;
      --muted-foreground: 200, 10%, 55%;
      --accent: 145, 50%, 45%;
      --border: 220, 15%, 18%;
      --input: 220, 15%, 18%;
      --radius: 0.75rem;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'Rajdhani', sans-serif;
      background: linear-gradient(180deg, hsl(220, 25%, 8%), hsl(220, 25%, 4%));
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Header */
    .header {
      border-bottom: 1px solid hsl(var(--border));
      background: hsl(var(--card) / 0.5);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0.75rem 1rem;
      width: 100%;
      flex-shrink: 0;
    }

    .header-content {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, hsl(45, 65%, 52%), hsl(40, 80%, 65%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .logo p {
      color: hsl(var(--muted-foreground));
      font-size: 0.875rem;
      margin: 0;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-name {
      color: hsl(var(--muted-foreground));
      font-size: 0.875rem;
    }

    /* Boutons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      touch-action: manipulation;
      min-height: 44px;
    }

    .btn-outline {
      background: transparent;
      border-color: hsl(var(--input));
      color: hsl(var(--foreground));
      min-width: 44px;
    }

    .btn-outline:active {
      background: hsl(var(--accent));
      transform: scale(0.98);
    }

    .btn-primary {
      background: hsl(var(--primary));
      color: hsl(220, 25%, 6%);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
      width: 100%;
      min-height: 48px;
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .btn-primary:active {
      transform: scale(0.98);
      background: hsl(45, 80%, 60%);
    }

    .btn-history {
      width: 100%;
      background: transparent;
      border: 1px solid hsl(var(--input));
      color: hsl(var(--foreground));
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
      min-height: 44px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      padding: 0.75rem;
      touch-action: manipulation;
      margin-top: 0.5rem;
    }

    .btn-history:active {
      background: hsl(var(--accent));
      color: hsl(var(--primary));
      transform: scale(0.98);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 1rem;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      overflow-y: auto;
    }

    /* Cards */
    .card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      width: 100%;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin: 0;
    }

    .card-title svg {
      color: hsl(var(--primary));
      width: 22px;
      height: 22px;
    }

    /* Formulaire */
    .form-group {
      margin-bottom: 1rem;
      width: 100%;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      color: hsl(var(--foreground));
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }

    label svg {
      color: hsl(var(--primary));
      width: 14px;
      height: 14px;
    }

    input {
      height: 48px;
      padding: 0 1rem;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid hsl(var(--input));
      background: hsl(var(--secondary));
      color: hsl(var(--foreground));
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    input:focus {
      outline: 2px solid hsl(45, 65%, 52%);
      outline-offset: 2px;
    }

    /* Résultat */
    .result-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 30px -5px hsl(145 50% 45% / 0.3);
      display: none;
      width: 100%;
    }

    .result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
      background: linear-gradient(135deg, hsl(145, 50%, 45%), hsl(160, 60%, 55%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .result-main {
      text-align: center;
      margin-bottom: 1rem;
    }

    .result-label {
      color: hsl(var(--muted-foreground));
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, hsl(45, 65%, 52%), hsl(40, 80%, 65%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .result-item {
      background: hsl(var(--secondary));
      border-radius: var(--radius);
      padding: 0.75rem;
      text-align: center;
    }

    .result-item .label {
      color: hsl(var(--muted-foreground));
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .result-item .value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: hsl(var(--foreground));
    }

    .admin-details {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid hsl(var(--border));
      display: none;
    }

    .admin-details p {
      color: hsl(var(--muted-foreground));
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .details-content {
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
    }

    /* Historique */
    .history-section {
      margin-top: 0.5rem;
      width: 100%;
    }

    .history-table {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
    }

    th {
      text-align: left;
      padding: 0.75rem 0.5rem;
      background: hsl(var(--secondary) / 0.5);
      border-bottom: 1px solid hsl(var(--border));
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: hsl(var(--muted-foreground));
      white-space: nowrap;
    }

    td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid hsl(var(--border) / 0.5);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .prediction-cell {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      color: hsl(var(--primary));
    }

    .date-cell {
      color: hsl(var(--muted-foreground));
      font-size: 0.7rem;
    }

    .empty-history {
      text-align: center;
      padding: 2rem 1rem;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      width: 100%;
    }

    /* Utilitaires */
    .hidden {
      display: none;
    }

    .glow-gold {
      box-shadow: 0 0 30px -5px hsl(45 65% 52% / 0.3);
    }

    /* Empêcher le zoom */
    button, a, .btn, .btn-history, input {
      touch-action: pan-y pinch-zoom;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function() {
      // Empêcher le pinch zoom
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
      });

      // ----- DONNÉES HISTORIQUE -----
      let predictions = [];

      // ----- FONCTION CALCUL -----
      function calculer(tour, multi, decimal, constante) {
        const res = (constante / decimal) * 0.97;
        const resStr = res.toString().replace('.', '');
        const multiStr = multi.toString().replace('.', '');
        
        let reste = resStr;
        if (resStr.startsWith(multiStr)) {
          reste = resStr.substring(multiStr.length);
        }
        
        const paires = [];
        for (let i = 0; i < reste.length - 1; i += 2) {
          paires.push(parseInt(reste.substring(i, i + 2), 10));
        }
        
        const trie = [...paires].sort((a, b) => a - b);
        const second = trie.length >= 2 ? trie[1] : trie[0] || 0;
        
        const prediction = (tour + second) - 3;
        
        const multiParts = multi.toString().split('.');
        const decPart = multiParts[1] || '0';
        const premier = decPart.charAt(0);
        const coteMax = parseInt(premier, 10) * 5;
        const coteMoyen = (coteMax / 2) - 0.5;
        
        return {
          prediction: prediction,
          coteMax: coteMax,
          coteMoyen: coteMoyen,
          formule: res,
          reste: reste,
          paires: paires,
          trie: trie,
          second: second
        };
      }

      // ----- FONCTION HISTORIQUE -----
      function afficherHistorique() {
        const container = document.getElementById('history-container');
        if (!container) return;

        if (predictions.length === 0) {
          container.innerHTML = '<div class="empty-history">Aucun historique disponible</div>';
          return;
        }

        let html = '<div class="history-table"><table><thead><tr>';
        html += '<th>Tour</th><th>Multi.</th><th>Prédiction</th><th>Côte</th><th>Date</th>';
        html += '</tr></thead><tbody>';

        for (let i = 0; i < predictions.length; i++) {
          const p = predictions[i];
          const date = new Date(p.date).toLocaleDateString('fr-FR', {
            day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
          });
          
          html += '<tr>';
          html += '<td>' + p.tour + '</td>';
          html += '<td>' + p.multi + '</td>';
          html += '<td class="prediction-cell">' + p.prediction + '</td>';
          html += '<td>' + p.coteMax + '</td>';
          html += '<td class="date-cell">' + date + '</td>';
          html += '</tr>';
        }

        html += '</tbody></table></div>';
        container.innerHTML = html;
      }

      // ----- CRÉATION INTERFACE -----
      function init() {
        const root = document.getElementById('root');
        
        root.innerHTML = `
          <!-- Header -->
          <div class="header">
            <div class="header-content">
              <div class="logo">
                <h1>Blizzard Imperial</h1>
                <p>Prediction TOUR</p>
              </div>
              <div class="user-info">
                <span class="user-name">Invité</span>
                <button class="btn btn-outline" id="logoutBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Main Content -->
          <div class="main-content">
            <!-- Calculator Card -->
            <div class="card glow-gold">
              <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>
                </svg>
                <h2>Calculateur</h2>
              </div>

              <div class="form-group">
                <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Heure départ</label>
                <input type="time" id="timeInput" value="12:00">
              </div>

              <div class="form-group">
                <label>N° Tour</label>
                <input type="number" id="tourInput" value="8029558">
              </div>

              <div class="form-group">
                <label>Multiplicateur</label>
                <input type="number" step="0.01" id="multiInput" value="45.05">
              </div>

              <div class="form-group">
                <label>Décimal</label>
                <input type="number" id="decimalInput" value="92463650">
              </div>

              <div class="form-group">
                <label>Constante</label>
                <input type="number" id="constanteInput" value="4294967293">
              </div>

              <button class="btn btn-primary" id="calculerBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
                </svg>
                CALCULER
              </button>
            </div>

            <!-- Result Card -->
            <div id="resultCard" class="result-card">
              <div class="result-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
                </svg>
                Résultat
              </div>
              <div class="result-main">
                <div class="result-label">Prédiction</div>
                <div class="result-value" id="predictionAff">0</div>
              </div>
              <div class="result-grid">
                <div class="result-item">
                  <div class="label">Côte Max</div>
                  <div class="value" id="coteMaxAff">0</div>
                </div>
                <div class="result-item">
                  <div class="label">Côte Moyen</div>
                  <div class="value" id="coteMoyenAff">0.0</div>
                </div>
              </div>
              <div id="adminDetails" class="admin-details">
                <p>Détail admin</p>
                <div id="detailsCalc" class="details-content"></div>
              </div>
            </div>

            <!-- History Button -->
            <button class="btn-history" id="historyBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
              </svg>
              HISTORIQUE
            </button>

            <!-- History Container -->
            <div id="history-container" class="history-section" style="display: none;"></div>
          </div>
        `;

        // ----- BOUTON CALCUL -----
        document.getElementById('calculerBtn').addEventListener('click', function(e) {
          e.preventDefault();
          
          const tour = parseInt(document.getElementById('tourInput').value);
          const multi = parseFloat(document.getElementById('multiInput').value);
          const decimal = parseInt(document.getElementById('decimalInput').value);
          const constante = parseInt(document.getElementById('constanteInput').value);

          if (!tour || !multi || !decimal || !constante) {
            alert('Remplissez tous les champs');
            return;
          }

          const res = calculer(tour, multi, decimal, constante);

          document.getElementById('predictionAff').textContent = res.prediction;
          document.getElementById('coteMaxAff').textContent = res.coteMax;
          document.getElementById('coteMoyenAff').textContent = res.coteMoyen.toFixed(1);
          document.getElementById('resultCard').style.display = 'block';

          document.getElementById('adminDetails').style.display = 'block';
          document.getElementById('detailsCalc').innerHTML = `
            <div>Formule: ${res.formule.toFixed(10)}</div>
            <div>Restant: ${res.reste}</div>
            <div>Paires: ${res.paires.join(' / ') || 'aucune'}</div>
            <div>2ème: ${res.second}</div>
          `;

          predictions.unshift({
            tour: tour,
            multi: multi,
            prediction: res.prediction,
            coteMax: res.coteMax,
            date: new Date().toISOString()
          });

          if (predictions.length > 20) predictions.pop();

          if (document.getElementById('history-container').style.display === 'block') {
            afficherHistorique();
          }
        });

        // ----- BOUTON HISTORIQUE -----
        document.getElementById('historyBtn').addEventListener('click', function() {
          const container = document.getElementById('history-container');
          const btn = document.getElementById('historyBtn');
          
          if (container.style.display === 'none') {
            container.style.display = 'block';
            btn.innerHTML = `
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
              </svg>
              MASQUER
            `;
            afficherHistorique();
          } else {
            container.style.display = 'none';
            btn.innerHTML = `
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
              </svg>
              HISTORIQUE
            `;
          }
        });

        // ----- BOUTON LOGOUT -----
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
          e.preventDefault();
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
